version: '3.9'

services:
  prd-engine-api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: prd-engine-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://prd_engine:secure_password@postgres:5432/prd_engine
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-min-32-chars}
      - API_PREFIX=/api/v1
      - MAX_RETRIES=3
      - RETRY_BACKOFF_BASE=2
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-webhook-secret-key}
      - IDEMPOTENCY_TTL_HOURS=24
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prd-engine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs

  prd-engine-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: prd-engine-worker
    restart: unless-stopped
    command: python -m uvicorn prd_engine.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://prd_engine:secure_password@postgres:5432/prd_engine
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-min-32-chars}
      - WORKER_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prd-engine-network

  postgres:
    image: postgres:15-alpine
    container_name: prd-engine-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=prd_engine
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=prd_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - prd-engine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prd_engine -d prd_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: prd-engine-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - prd-engine-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  prd-engine-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
